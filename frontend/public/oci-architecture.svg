  <rect x="608" y="136" width="160" height="60" rx="8" fill="rgba(240,136,62,0.06)" stroke="#f0883e" stroke-width="0.8"/>
  <text x="620" y="158" fill="#f0883e" font-size="11" font-weight="700">Local Embeddings</text>
  <text x="620" y="176" fill="#e6edf3" font-size="10">all-MiniLM-L6-v2</text>
  <text x="620" y="190" fill="#8b949e" font-size="9">384-dim | Zero latency</text>

  <!-- Arrow -->
  <line x1="768" y1="166" x2="790" y2="166" stroke="#f0883e" stroke-width="1.5" marker-end="url(#aO)"/>

  <!-- ChromaDB -->
  <rect x="798" y="136" width="150" height="60" rx="8" fill="rgba(210,153,34,0.06)" stroke="#d29922" stroke-width="0.8"/>
  <text x="810" y="158" fill="#d29922" font-size="11" font-weight="700">ChromaDB</text>
  <text x="810" y="176" fill="#e6edf3" font-size="10">Vector Store</text>
  <text x="810" y="190" fill="#8b949e" font-size="9">Cosine similarity</text>

