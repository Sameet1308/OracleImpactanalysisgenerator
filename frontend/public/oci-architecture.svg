  <line x1="608" y1="212" x2="948" y2="212" stroke="#1f2937" stroke-width="0.8"/>
  <text x="608" y="234" fill="#8b949e" font-size="10" font-weight="600">Knowledge Sources:</text>
  <circle cx="618" cy="254" r="4" fill="#3fb950"/>
  <text x="630" y="258" fill="#e6edf3" font-size="10">Oracle Documentation + ORA Error Codes</text>
  <circle cx="618" cy="276" r="4" fill="#58a6ff"/>
  <text x="630" y="280" fill="#e6edf3" font-size="10">Uploaded Artifacts (SQL, OIC, BIP, Groovy)</text>

  <!-- 2-stage retrieval label -->
  <text x="608" y="302" fill="#58a6ff" font-size="9" font-weight="600">2-Stage Retrieval: Exact match + Semantic search (top-k=5)</text>

  <!-- Big arrow down to AI -->
  <line x1="778" y1="312" x2="778" y2="370" stroke="#f0883e" stroke-width="2.5" opacity="0.5" marker-end="url(#aO)"/>
  <text x="790" y="348" fill="#f0883e" font-size="9" font-weight="600" opacity="0.7">code_context</text>

