  <rect x="1048" y="112" width="320" height="68" rx="10" fill="url(#cardGrad)" stroke="#f85149" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="1056" y="120" width="4" height="52" rx="2" fill="#f85149"/>
  <text x="1072" y="140" fill="#e6edf3" font-size="13" font-weight="700">Root Cause Analysis</text>
  <text x="1072" y="160" fill="#8b949e" font-size="10">Why this change breaks downstream artifacts</text>

  <rect x="1048" y="196" width="320" height="68" rx="10" fill="url(#cardGrad)" stroke="#3fb950" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="1056" y="204" width="4" height="52" rx="2" fill="#3fb950"/>
  <text x="1072" y="224" fill="#e6edf3" font-size="13" font-weight="700">Fix Recommendations</text>
  <text x="1072" y="244" fill="#8b949e" font-size="10">Oracle ORA error codes + remediation steps</text>

  <rect x="1048" y="280" width="320" height="68" rx="10" fill="url(#cardGrad)" stroke="#58a6ff" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="1056" y="288" width="4" height="52" rx="2" fill="#58a6ff"/>
  <text x="1072" y="308" fill="#e6edf3" font-size="13" font-weight="700">Testing Checklist</text>
  <text x="1072" y="328" fill="#8b949e" font-size="10">Regression test plan for impacted objects</text>

  <rect x="1048" y="364" width="320" height="68" rx="10" fill="url(#cardGrad)" stroke="#d29922" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="1056" y="372" width="4" height="52" rx="2" fill="#d29922"/>
  <text x="1072" y="392" fill="#e6edf3" font-size="13" font-weight="700">Rollback Plan</text>
  <text x="1072" y="412" fill="#8b949e" font-size="10">Safe reversal steps if deployment fails</text>

