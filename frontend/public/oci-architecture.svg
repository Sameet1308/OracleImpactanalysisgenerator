  <text x="1060" y="468" fill="#6e7681" font-size="10" font-weight="700" letter-spacing="2">FRONTEND</text>

  <rect x="1048" y="484" width="320" height="56" rx="10" fill="url(#cardGrad)" stroke="#a371f7" stroke-width="1" filter="url(#sh)"/>
  <rect x="1056" y="492" width="4" height="40" rx="2" fill="#a371f7"/>
  <text x="1072" y="512" fill="#e6edf3" font-size="12" font-weight="700">Next.js + D3.js</text>
  <text x="1200" y="512" fill="#8b949e" font-size="10">Interactive radial spoke graph</text>

  <rect x="1048" y="556" width="155" height="48" rx="10" fill="url(#cardGrad)" stroke="#1f2937" stroke-width="1" filter="url(#sh)"/>
  <text x="1066" y="584" fill="#e6edf3" font-size="10" font-weight="600">Risk Dashboard</text>

  <rect x="1213" y="556" width="155" height="48" rx="10" fill="url(#cardGrad)" stroke="#1f2937" stroke-width="1" filter="url(#sh)"/>
  <text x="1231" y="584" fill="#e6edf3" font-size="10" font-weight="600">PDF Export</text>

