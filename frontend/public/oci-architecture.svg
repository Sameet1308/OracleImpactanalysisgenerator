  <rect x="588" y="400" width="380" height="140" rx="14" fill="url(#cardGrad)" stroke="#f0883e" stroke-width="2" filter="url(#glow)"/>
  <rect x="588" y="400" width="380" height="3" rx="1.5" fill="#f0883e"/>

  <!-- BlueVerse logo area -->
  <circle cx="640" cy="452" r="28" fill="rgba(240,136,62,0.1)" stroke="#f0883e" stroke-width="1.5"/>
  <text x="640" y="445" fill="#f0883e" font-size="14" text-anchor="middle" font-weight="800">BV</text>
  <text x="640" y="462" fill="#f0883e" font-size="7" text-anchor="middle" font-weight="600">FOUNDRY</text>

  <text x="684" y="430" fill="#e6edf3" font-size="16" font-weight="800">BlueVerse Foundry</text>
  <text x="684" y="452" fill="#f0883e" font-size="12" font-weight="600">LTIMindtree AI Marketplace</text>
  <text x="684" y="474" fill="#8b949e" font-size="10">Pre-trained Oracle ERP Agent (AI_Elite_Ora1)</text>
