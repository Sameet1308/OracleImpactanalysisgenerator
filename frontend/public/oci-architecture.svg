<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
    <marker id="a" viewBox="0 -6 14 12" refX="12" refY="0" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,-5L12,0L0,5" fill="#C74634"/></marker>
  </defs>

  <rect width="1200" height="700" fill="#0d1117"/>

  <!-- Title -->
  <rect x="0" y="0" width="1200" height="44" fill="#C74634"/>
  <text x="20" y="29" fill="#fff" font-size="15" font-weight="800">AI_ELITE_ORA1  —  How It Works</text>
  <text x="980" y="29" fill="rgba(255,255,255,0.7)" font-size="10">Oracle Impact Analysis</text>

  <!-- ====== STEP 1: USER ====== -->
  <rect x="30" y="70" width="160" height="190" rx="12" fill="#161b22" stroke="#58a6ff" stroke-width="2" filter="url(#s)"/>
  <text x="110" y="98" fill="#58a6ff" font-size="10" font-weight="700" text-anchor="middle">STEP 1</text>
  <text x="110" y="120" fill="#e6edf3" font-size="14" font-weight="800" text-anchor="middle">User</text>
  <line x1="50" y1="130" x2="170" y2="130" stroke="#21262d"/>
  <text x="50" y="150" fill="#c9d1d9" font-size="9" font-weight="600">Option A:</text>
  <text x="50" y="164" fill="#8b949e" font-size="9">Upload .sql .xml .groovy</text>
  <text x="50" y="184" fill="#c9d1d9" font-size="9" font-weight="600">Option B:</text>
  <text x="50" y="198" fill="#8b949e" font-size="9">Connect to Oracle DB</text>
  <text x="50" y="218" fill="#c9d1d9" font-size="9" font-weight="600">Option C:</text>
  <text x="50" y="232" fill="#8b949e" font-size="9">Load demo artifacts</text>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="165" x2="230" y2="165" stroke="#C74634" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="210" y="155" fill="#C74634" font-size="7" text-anchor="middle" font-weight="600">raw files</text>

  <!-- ====== STEP 2: PARSE ====== -->
  <rect x="240" y="70" width="180" height="190" rx="12" fill="#161b22" stroke="#d29922" stroke-width="2" filter="url(#s)"/>
  <text x="330" y="98" fill="#d29922" font-size="10" font-weight="700" text-anchor="middle">STEP 2</text>
  <text x="330" y="120" fill="#e6edf3" font-size="14" font-weight="800" text-anchor="middle">Parse Artifacts</text>
  <line x1="260" y1="130" x2="400" y2="130" stroke="#21262d"/>
  <text x="260" y="150" fill="#d29922" font-size="9" font-weight="600">sqlparse + regex</text>
  <text x="260" y="166" fill="#8b949e" font-size="9">→ CREATE TABLE, VIEW, PROC</text>
  <text x="260" y="182" fill="#8b949e" font-size="9">→ FOREIGN KEY references</text>
  <text x="260" y="198" fill="#8b949e" font-size="9">→ FROM/JOIN table refs</text>
  <text x="260" y="214" fill="#d29922" font-size="9" font-weight="600">xml.etree</text>
  <text x="260" y="230" fill="#8b949e" font-size="9">→ OIC steps, BIP datasets</text>
  <text x="260" y="246" fill="#d29922" font-size="9" font-weight="600">regex for Groovy</text>

  <!-- Arrow 2→3 (splits into two) -->
  <line x1="420" y1="140" x2="468" y2="140" stroke="#C74634" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="444" y="132" fill="#C74634" font-size="7" text-anchor="middle" font-weight="600">objects</text>
  <text x="444" y="143" fill="#C74634" font-size="7" text-anchor="middle" font-weight="600">+ deps</text>

  <line x1="420" y1="210" x2="468" y2="210" stroke="#C74634" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="444" y="200" fill="#C74634" font-size="7" text-anchor="middle" font-weight="600">source</text>
  <text x="444" y="211" fill="#C74634" font-size="7" text-anchor="middle" font-weight="600">code</text>

  <!-- ====== STEP 3A: GRAPH ====== -->
  <rect x="478" y="70" width="180" height="110" rx="12" fill="#161b22" stroke="#a371f7" stroke-width="2" filter="url(#s)"/>
  <text x="568" y="98" fill="#a371f7" font-size="10" font-weight="700" text-anchor="middle">STEP 3A</text>
  <text x="568" y="118" fill="#e6edf3" font-size="13" font-weight="800" text-anchor="middle">Build Graph</text>
  <line x1="498" y1="126" x2="638" y2="126" stroke="#21262d"/>
  <text x="498" y="146" fill="#a371f7" font-size="9" font-weight="600">NetworkX DiGraph</text>
  <text x="498" y="162" fill="#8b949e" font-size="9">Nodes = objects, Edges = deps</text>

  <!-- ====== STEP 3B: EMBED ====== -->
  <rect x="478" y="192" width="180" height="110" rx="12" fill="#161b22" stroke="#f0883e" stroke-width="2" filter="url(#s)"/>
  <text x="568" y="220" fill="#f0883e" font-size="10" font-weight="700" text-anchor="middle">STEP 3B</text>
  <text x="568" y="240" fill="#e6edf3" font-size="13" font-weight="800" text-anchor="middle">Embed in RAG</text>
  <line x1="498" y1="248" x2="638" y2="248" stroke="#21262d"/>
  <text x="498" y="266" fill="#f0883e" font-size="9" font-weight="600">all-MiniLM-L6-v2 → ChromaDB</text>
  <text x="498" y="282" fill="#8b949e" font-size="9">384-dim vectors, local, zero cost</text>

  <!-- Arrow 3A→4 -->
  <line x1="658" y1="130" x2="710" y2="200" stroke="#C74634" stroke-width="2" marker-end="url(#a)"/>
  <text x="694" y="156" fill="#a371f7" font-size="7" font-weight="600">impact</text>

  <!-- Arrow 3B→4 -->
  <line x1="658" y1="250" x2="710" y2="220" stroke="#C74634" stroke-width="2" marker-end="url(#a)"/>
  <text x="694" y="246" fill="#f0883e" font-size="7" font-weight="600">code context</text>

  <!-- ====== STEP 4: USER SELECTS + ANALYZE ====== -->
  <rect x="720" y="150" width="200" height="140" rx="12" fill="#161b22" stroke="#C74634" stroke-width="2" filter="url(#s)"/>
  <text x="820" y="178" fill="#C74634" font-size="10" font-weight="700" text-anchor="middle">STEP 4</text>
  <text x="820" y="200" fill="#e6edf3" font-size="13" font-weight="800" text-anchor="middle">Analyze Impact</text>
  <line x1="740" y1="208" x2="900" y2="208" stroke="#21262d"/>
  <text x="740" y="228" fill="#c9d1d9" font-size="9">User selects: EMPLOYEES</text>
  <text x="740" y="244" fill="#8b949e" font-size="9">→ BFS finds 8 direct dependents</text>
  <text x="740" y="260" fill="#8b949e" font-size="9">→ Score: 89 CRITICAL</text>
  <text x="740" y="276" fill="#8b949e" font-size="9">→ RAG retrieves 5 code snippets</text>

  <!-- Arrow 4→5 -->
  <line x1="920" y1="220" x2="960" y2="220" stroke="#C74634" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="940" y="210" fill="#C74634" font-size="7" text-anchor="middle" font-weight="600">prompt</text>

  <!-- ====== STEP 5: AI ====== -->
  <rect x="970" y="70" width="200" height="130" rx="12" fill="#161b22" stroke="#f0883e" stroke-width="2" filter="url(#s)"/>
  <text x="1070" y="98" fill="#f0883e" font-size="10" font-weight="700" text-anchor="middle">STEP 5</text>
  <text x="1070" y="118" fill="#e6edf3" font-size="13" font-weight="800" text-anchor="middle">BlueVerse AI</text>
  <line x1="990" y1="126" x2="1150" y2="126" stroke="#21262d"/>
  <text x="990" y="146" fill="#f0883e" font-size="9" font-weight="600">AI_Elite_Ora1 agent</text>
  <text x="990" y="162" fill="#8b949e" font-size="9">Receives: impact + code + question</text>
  <text x="990" y="178" fill="#8b949e" font-size="9">Returns: structured analysis</text>
  <text x="990" y="194" fill="#f0883e" font-size="8">One API call. No chains. No agents.</text>

  <!-- Arrow 5→6 -->
  <line x1="1070" y1="200" x2="1070" y2="310" stroke="#C74634" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="1084" y="260" fill="#C74634" font-size="7" font-weight="600">response</text>

  <!-- ====== STEP 6: OUTPUT ====== -->
  <rect x="30" y="330" width="1140" height="100" rx="12" fill="#161b22" stroke="#3fb950" stroke-width="2" filter="url(#s)"/>
  <text x="600" y="358" fill="#3fb950" font-size="10" font-weight="700" text-anchor="middle">STEP 6 — AI OUTPUT (4 deliverables)</text>
  <line x1="50" y1="366" x2="1150" y2="366" stroke="#21262d"/>

  <rect x="50" y="378" width="250" height="36" rx="6" fill="#0d1117" stroke="#f85149" stroke-width="1"/>
  <rect x="54" y="382" width="4" height="28" rx="2" fill="#f85149"/>
  <text x="68" y="401" fill="#c9d1d9" font-size="11" font-weight="700">Root Cause Analysis</text>

  <rect x="320" y="378" width="250" height="36" rx="6" fill="#0d1117" stroke="#3fb950" stroke-width="1"/>
  <rect x="324" y="382" width="4" height="28" rx="2" fill="#3fb950"/>
  <text x="338" y="401" fill="#c9d1d9" font-size="11" font-weight="700">Fix Recommendations + ORA codes</text>

  <rect x="590" y="378" width="250" height="36" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="1"/>
  <rect x="594" y="382" width="4" height="28" rx="2" fill="#58a6ff"/>
  <text x="608" y="401" fill="#c9d1d9" font-size="11" font-weight="700">Testing Checklist</text>

  <rect x="860" y="378" width="250" height="36" rx="6" fill="#0d1117" stroke="#d29922" stroke-width="1"/>
  <rect x="864" y="382" width="4" height="28" rx="2" fill="#d29922"/>
  <text x="878" y="401" fill="#c9d1d9" font-size="11" font-weight="700">Rollback Plan</text>

  <!-- Arrow 6→7 -->
  <line x1="600" y1="430" x2="600" y2="470" stroke="#C74634" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- ====== STEP 7: FRONTEND ====== -->
  <rect x="30" y="480" width="1140" height="80" rx="12" fill="#161b22" stroke="#a371f7" stroke-width="2" filter="url(#s)"/>
  <text x="600" y="506" fill="#a371f7" font-size="10" font-weight="700" text-anchor="middle">STEP 7 — USER SEES RESULTS</text>
  <line x1="50" y1="514" x2="1150" y2="514" stroke="#21262d"/>

  <text x="140" y="540" fill="#a371f7" font-size="11" font-weight="700" text-anchor="middle">D3.js Radial Graph</text>
  <text x="380" y="540" fill="#C74634" font-size="11" font-weight="700" text-anchor="middle">Ask Ora1 Chat</text>
  <text x="600" y="540" fill="#f85149" font-size="11" font-weight="700" text-anchor="middle">Risk Score Dashboard</text>
  <text x="820" y="540" fill="#d29922" font-size="11" font-weight="700" text-anchor="middle">PDF Report Export</text>
  <text x="1040" y="540" fill="#58a6ff" font-size="11" font-weight="700" text-anchor="middle">Connector Tiles</text>

  <!-- ====== CHAT LOOP ARROW ====== -->
  <path d="M380 560 L380 590 L820 590 L820 230 L920 220" stroke="#C74634" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#a)"/>
  <text x="600" y="604" fill="#C74634" font-size="8" font-weight="600" text-anchor="middle">user asks follow-up question → goes back to Step 4+5</text>

  <!-- ====== TECH LABELS AT BOTTOM ====== -->
  <rect x="30" y="630" width="1140" height="50" rx="8" fill="#161b22" stroke="#21262d"/>
  <text x="50" y="654" fill="#6e7681" font-size="9" font-weight="700">TECH:</text>
  <text x="90" y="654" fill="#a371f7" font-size="9">FastAPI</text>
  <text x="140" y="654" fill="#6e7681" font-size="9">|</text>
  <text x="152" y="654" fill="#a371f7" font-size="9">NetworkX</text>
  <text x="220" y="654" fill="#6e7681" font-size="9">|</text>
  <text x="232" y="654" fill="#f0883e" font-size="9">sentence-transformers</text>
  <text x="365" y="654" fill="#6e7681" font-size="9">|</text>
  <text x="377" y="654" fill="#d29922" font-size="9">ChromaDB</text>
  <text x="440" y="654" fill="#6e7681" font-size="9">|</text>
  <text x="452" y="654" fill="#f0883e" font-size="9">BlueVerse Foundry</text>
  <text x="570" y="654" fill="#6e7681" font-size="9">|</text>
  <text x="582" y="654" fill="#58a6ff" font-size="9">Next.js + D3.js</text>
  <text x="670" y="654" fill="#6e7681" font-size="9">|</text>
  <text x="682" y="654" fill="#8b949e" font-size="9">ReportLab PDF</text>
  <text x="770" y="654" fill="#6e7681" font-size="9">|</text>
  <text x="782" y="654" fill="#d29922" font-size="9">sqlparse + regex</text>
  <text x="880" y="654" fill="#6e7681" font-size="9">|</text>
  <text x="892" y="654" fill="#8b949e" font-size="9">xml.etree</text>

  <text x="50" y="672" fill="#484f58" font-size="8">No LangChain. No LangGraph. No guardrails. No agent framework. Just a clean pipeline: parse → graph → embed → analyze → show.</text>

  <!-- Bottom credit -->
  <text x="1020" y="672" fill="#30363d" font-size="8">Team: Sameet, Rahul, Suraj, Arpan</text>
</svg>
