  <text x="684" y="514" fill="#8b949e" font-size="10">Oracle-specific ORA error codes &amp; best practices</text>

  <!-- Arrow right to output -->
  <line x1="968" y1="470" x2="1030" y2="470" stroke="#ffffff" stroke-width="2" opacity="0.2" marker-end="url(#aW)"/>

