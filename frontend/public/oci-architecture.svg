<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.18"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.94  0 0 0 0 0.53  0 0 0 0 0.24  0 0 0 0.25 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="aW" viewBox="0 -6 12 12" refX="10" refY="0" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,-5L10,0L0,5" fill="#fff" opacity="0.6"/></marker>
    <marker id="aO" viewBox="0 -6 12 12" refX="10" refY="0" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,-5L10,0L0,5" fill="#f0883e"/></marker>
    <linearGradient id="topBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C74634"/><stop offset="100%" stop-color="#E85D4A"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2130"/><stop offset="100%" stop-color="#141922"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="780" fill="#0a0e17" rx="0"/>
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <rect width="40" height="40" fill="none"/>
    <line x1="40" y1="0" x2="40" y2="40" stroke="#ffffff" stroke-width="0.3" opacity="0.03"/>
    <line x1="0" y1="40" x2="40" y2="40" stroke="#ffffff" stroke-width="0.3" opacity="0.03"/>
  </pattern>
  <rect width="1400" height="780" fill="url(#grid)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1400" height="56" fill="url(#topBar)"/>
  <text x="32" y="36" fill="#fff" font-size="18" font-weight="800" letter-spacing="0.8">ORACLE PYTHIA-26</text>
  <text x="250" y="36" fill="rgba(255,255,255,0.6)" font-size="14" font-weight="400">Solution Architecture</text>
  <text x="1080" y="30" fill="rgba(255,255,255,0.5)" font-size="10">Impact Analysis Generator</text>
  <text x="1080" y="46" fill="rgba(255,255,255,0.4)" font-size="10">LTIMindtree  |  Pythia-26 Hackathon</text>

  <!-- ========== LEFT: INPUT SOURCES ========== -->
  <text x="60" y="96" fill="#6e7681" font-size="10" font-weight="700" letter-spacing="2">INPUT</text>

  <!-- Oracle Artifacts card -->
  <rect x="32" y="112" width="200" height="200" rx="12" fill="url(#cardGrad)" stroke="#1f2937" stroke-width="1" filter="url(#sh)"/>
  <!-- icon area -->
  <circle cx="82" cy="158" r="24" fill="rgba(88,166,255,0.08)" stroke="#58a6ff" stroke-width="1"/>
  <text x="82" y="164" fill="#58a6ff" font-size="20" text-anchor="middle" font-weight="300">&#x2191;</text>
  <text x="130" y="152" fill="#e6edf3" font-size="13" font-weight="700">Upload</text>
  <text x="130" y="168" fill="#e6edf3" font-size="13" font-weight="700">Artifacts</text>
  <line x1="52" y1="188" x2="212" y2="188" stroke="#1f2937" stroke-width="1"/>
  <text x="52" y="210" fill="#58a6ff" font-size="10" font-weight="600">SQL / PL-SQL</text>
  <text x="52" y="228" fill="#a371f7" font-size="10" font-weight="600">OIC Integrations (XML)</text>
  <text x="52" y="246" fill="#3fb950" font-size="10" font-weight="600">BIP Reports (XML)</text>
  <text x="52" y="264" fill="#d29922" font-size="10" font-weight="600">Groovy Scripts</text>
  <text x="52" y="288" fill="#484f58" font-size="9">Drag &amp; drop or REST API</text>

  <!-- Big flow arrow -->
  <line x1="232" y1="212" x2="290" y2="212" stroke="#ffffff" stroke-width="2" opacity="0.2" marker-end="url(#aW)"/>

  <!-- ========== CENTER-LEFT: PROCESSING ENGINE ========== -->
  <text x="310" y="96" fill="#6e7681" font-size="10" font-weight="700" letter-spacing="2">PROCESSING ENGINE</text>

  <!-- Parser -->
  <rect x="300" y="112" width="220" height="90" rx="12" fill="url(#cardGrad)" stroke="#1f2937" stroke-width="1" filter="url(#sh)"/>
  <rect x="308" y="120" width="4" height="74" rx="2" fill="#d29922"/>
  <text x="324" y="142" fill="#e6edf3" font-size="13" font-weight="700">Smart Parsers</text>
  <text x="324" y="162" fill="#8b949e" font-size="10">sqlparse + regex | xml.etree</text>
  <text x="324" y="180" fill="#8b949e" font-size="10">Auto-detect artifact type</text>

  <!-- Graph Engine -->
  <rect x="300" y="220" width="220" height="90" rx="12" fill="url(#cardGrad)" stroke="#a371f7" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="308" y="228" width="4" height="74" rx="2" fill="#a371f7"/>
  <text x="324" y="250" fill="#e6edf3" font-size="13" font-weight="700">Graph Engine</text>
  <text x="324" y="270" fill="#a371f7" font-size="10" font-weight="600">NetworkX DiGraph</text>
  <text x="324" y="288" fill="#8b949e" font-size="10">Blast radius + risk scoring (0-100)</text>

  <!-- Arrow down from parser to graph -->
  <line x1="410" y1="202" x2="410" y2="220" stroke="#d29922" stroke-width="1.5" opacity="0.4"/>

  <!-- Arrow right from parser to RAG -->
  <line x1="520" y1="157" x2="580" y2="157" stroke="#ffffff" stroke-width="2" opacity="0.2" marker-end="url(#aW)"/>
  <!-- Arrow right from graph to AI -->
  <line x1="520" y1="265" x2="580" y2="440" stroke="#ffffff" stroke-width="1.5" opacity="0.15"/>

  <!-- ========== CENTER: RAG PIPELINE ========== -->
  <text x="600" y="96" fill="#6e7681" font-size="10" font-weight="700" letter-spacing="2">RAG PIPELINE</text>

  <!-- RAG pipeline big card -->
  <rect x="588" y="112" width="380" height="200" rx="14" fill="url(#cardGrad)" stroke="#f0883e" stroke-width="1.5" filter="url(#sh)"/>
  <!-- Glow accent on top -->
  <rect x="588" y="112" width="380" height="3" rx="1.5" fill="#f0883e" opacity="0.6"/>

