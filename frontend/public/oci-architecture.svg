  <rect x="0" y="640" width="1400" height="140" fill="rgba(22,27,34,0.6)"/>
  <line x1="0" y1="640" x2="1400" y2="640" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="672" fill="#6e7681" font-size="10" font-weight="700" letter-spacing="2">TECHNOLOGY STACK</text>

  <!-- Tech badges -->
  <rect x="60" y="688" width="110" height="32" rx="6" fill="rgba(163,113,247,0.08)" stroke="#a371f7" stroke-width="0.8"/>
  <text x="115" y="709" fill="#a371f7" font-size="10" text-anchor="middle" font-weight="600">FastAPI</text>

  <rect x="182" y="688" width="110" height="32" rx="6" fill="rgba(163,113,247,0.08)" stroke="#a371f7" stroke-width="0.8"/>
  <text x="237" y="709" fill="#a371f7" font-size="10" text-anchor="middle" font-weight="600">NetworkX</text>

  <rect x="304" y="688" width="150" height="32" rx="6" fill="rgba(240,136,62,0.08)" stroke="#f0883e" stroke-width="0.8"/>
  <text x="379" y="709" fill="#f0883e" font-size="10" text-anchor="middle" font-weight="600">sentence-transformers</text>

  <rect x="466" y="688" width="110" height="32" rx="6" fill="rgba(210,153,34,0.08)" stroke="#d29922" stroke-width="0.8"/>
  <text x="521" y="709" fill="#d29922" font-size="10" text-anchor="middle" font-weight="600">ChromaDB</text>

  <rect x="588" y="688" width="140" height="32" rx="6" fill="rgba(240,136,62,0.08)" stroke="#f0883e" stroke-width="0.8"/>
  <text x="658" y="709" fill="#f0883e" font-size="10" text-anchor="middle" font-weight="600">BlueVerse Foundry</text>

  <rect x="740" y="688" width="90" height="32" rx="6" fill="rgba(88,166,255,0.08)" stroke="#58a6ff" stroke-width="0.8"/>
  <text x="785" y="709" fill="#58a6ff" font-size="10" text-anchor="middle" font-weight="600">Next.js</text>

  <rect x="842" y="688" width="80" height="32" rx="6" fill="rgba(88,166,255,0.08)" stroke="#58a6ff" stroke-width="0.8"/>
  <text x="882" y="709" fill="#58a6ff" font-size="10" text-anchor="middle" font-weight="600">D3.js</text>

  <rect x="934" y="688" width="100" height="32" rx="6" fill="rgba(139,148,158,0.08)" stroke="#8b949e" stroke-width="0.8"/>
  <text x="984" y="709" fill="#8b949e" font-size="10" text-anchor="middle" font-weight="600">ReportLab</text>

  <!-- Key metrics -->
  <text x="1100" y="672" fill="#6e7681" font-size="10" font-weight="700" letter-spacing="2">KEY METRICS</text>

  <text x="1100" y="698" fill="#f85149" font-size="28" font-weight="800">82</text>
  <text x="1140" y="692" fill="#8b949e" font-size="9">Risk Score</text>
  <text x="1140" y="706" fill="#f85149" font-size="9" font-weight="700">CRITICAL</text>

  <text x="1210" y="698" fill="#a371f7" font-size="28" font-weight="800">25</text>
  <text x="1250" y="692" fill="#8b949e" font-size="9">Objects</text>
  <text x="1250" y="706" fill="#8b949e" font-size="9">Parsed</text>

  <text x="1310" y="698" fill="#3fb950" font-size="28" font-weight="800">9</text>
  <text x="1332" y="692" fill="#8b949e" font-size="9">Impacted</text>
  <text x="1332" y="706" fill="#8b949e" font-size="9">Artifacts</text>

  <!-- Bottom credit -->
  <text x="60" y="756" fill="#30363d" font-size="9">Team: Sameet (Lead), Pranali, Suraj  |  LTIMindtree  |  Oracle Pythia-26 Hackathon</text>
</svg>
